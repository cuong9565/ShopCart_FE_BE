name: Cart Feature CI/CD 

on:
  push:
    branches: [ feature/cicd_backend_cart ] 

    
jobs:
  backend-cart-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 25
        uses: actions/setup-java@v4
        with:
          java-version: '25' 
          distribution: 'oracle' 
          cache: maven

      - name: Test & Coverage (Cart Only)
        run: |
          cd backend
          # Chạy test đích danh CartTest và tạo báo cáo JaCoCo
          mvn clean test -Dtest=CartTest jacoco:report
          
      - name: Upload Report
        uses: actions/upload-artifact@v4
        with:
          name: cart-coverage-report
          path: backend/target/site/jacoco/